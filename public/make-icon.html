<!DOCTYPE html>
<html>
<head>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #C4CEBC; display: flex; align-items: center; justify-content: center; height: 100vh; }
    .icon {
      width: 512px; height: 512px; border-radius: 115px;
      background: #4A5E50; display: flex; align-items: center; justify-content: center;
    }
    .icon span {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-weight: 700;
      font-size: 360px; color: #C8993E;
      line-height: 1; margin-top: 20px; user-select: none;
    }
  </style>
</head>
<body>
  <div class="icon"><span>P</span></div>
</body>
</html>
